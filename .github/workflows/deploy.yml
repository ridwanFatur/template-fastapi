name: Deploy

on:
  push:
    branches:
      - prod

jobs:
  deploy-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.APP1_SSH_PRIVATEKEY }}

      - name: Add GCE VM to known hosts
        run: ssh-keyscan -H ${{ secrets.APP1_VM_IP }} >> ~/.ssh/known_hosts

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ridwan-faturrahman
          version: 'latest'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Docker image
        run: |
          IMAGE_NAME=us-central1-docker.pkg.dev/ridwan-faturrahman/fastapi-repo/fastapi-app
          IMAGE_TAG=${GITHUB_SHA::7}
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Push Docker image
        run: |
          IMAGE_NAME=us-central1-docker.pkg.dev/ridwan-faturrahman/fastapi-repo/fastapi-app
          IMAGE_TAG=${GITHUB_SHA::7}
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Deploy to GCE VM
        run: |          
          ssh ${{ secrets.APP1_VM_USER }}@${{ secrets.APP1_VM_IP }} << 'EOF'
            gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
            docker pull us-central1-docker.pkg.dev/ridwan-faturrahman/fastapi-repo/fastapi-app:latest

            gcloud secrets versions access latest --secret="APP1_ENV" > .env.fastapi
            
            docker stop fastapi-app || true
            docker remove fastapi-app || true
            
            docker run -d \
              --name fastapi-app \
              --restart always \
              -p 8000:8000 \
              --env-file .env.fastapi \
              us-central1-docker.pkg.dev/ridwan-faturrahman/fastapi-repo/fastapi-app:latest
            rm -f .env.fastapi
          EOF