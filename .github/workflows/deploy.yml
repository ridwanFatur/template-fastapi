name: Deploy

on:
  push:
    branches:
      - prod

jobs:
  deploy-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.1
        with:
          ssh-private-key: ${{ secrets.APP1_SSH_PRIVATEKEY }}

      - name: Run ls on GCE VM
        run: ssh -o StrictHostKeyChecking=no ${{ secrets.APP1_VM_USER }}@${{ secrets.APP1_VM_IP }} "ls -a" 

